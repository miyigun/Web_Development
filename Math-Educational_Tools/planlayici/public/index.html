<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Görev Uygulaması</title>
    
        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
        <!-- Font Awesome -->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    
        <!-- jQuery UI CSS -->
        <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    
        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="/public/icons/favicon.ico">
    
        <!-- Custom CSS -->
        <link rel="stylesheet" href="styles.css">
    
        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
        <!-- jQuery UI -->
        <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    
<body>
    <div id="app">
        <!-- Login / Register Screen -->
        <div class="login-container" id="loginScreen" style="display: none;">
            <h2 class="text-center" id="screenTitle" style="margin-bottom: 20px; font-weight: bold;">Giriş Yap</h2>
            <form id="loginForm">
                <div id="registerFields" style="display: none;">
                    <div class="mb-3">
                        <label for="newUsername" class="form-label">Yeni Kullanıcı Adı</label>
                        <input type="text" class="form-control" id="newUsername" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Şifre</label>
                        <input type="password" class="form-control" id="newPassword" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Şifre Tekrar</label>
                        <input type="password" class="form-control" id="confirmPassword" autocomplete="off">
                    </div>
                </div>
                <div id="loginFields">
                    <div class="mb-3">
                        <label for="username" class="form-label">Kullanıcı Adı</label>
                        <input type="text" class="form-control" id="username" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Şifre</label>
                        <input type="password" class="form-control" id="password" autocomplete="off">
                    </div>
                </div>
                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-primary custom-width" id="submitButton" disabled>Onayla</button>
                </div>                
            </form>
            <div class="text-danger mt-3" id="loginError" style="display: none;"></div>
        </div>
    
        <div id="mainApp" style="display: none;">
            <!-- Üst Bilgi -->
            <div class="top-info d-flex justify-content-between align-items-center p-2">
                <div class="user-info d-flex align-items-center">
                    <img src="/images/profil.jpg" alt="Profil Resmi" class="profile-pic" id="profilePicture">
                    <span class="username ms-2"><strong></strong></span>
                </div>
                <div class="level-info text-center">
                    <span class="level-title" style="color: gold;">Seviye</span>
                    <br>
                    <span id="level" class="userlevel">0</span>
                </div>
                <div class="resources d-flex align-items-center">
                    <span class="tp-info">
                        <span class="tp-label" style="color: #007bff;">TP:</span> 
                        <span class="usertp">0</span>
                    </span>
                    <span class="gold-info ms-3">
                        <i class="fas fa-coins" style="color: gold;"></i> <!-- Altın para simgesi -->
                        <span class="usergold">0</span>
                    </span>
                </div>
            </div>
        
            <!-- Ana İçerik -->
            <div class="d-flex">
                <!-- Sol Menü -->
                <div class="sidebar-left">
                    <button id="heroBtn" class="sidebar-btn" data-toggle="tooltip" title="Kahraman">
                        <i class="fas fa-user"></i> <!-- Kahraman simgesi -->
                    </button>
                    <button id="tasksBtn" class="sidebar-btn selected" data-toggle="tooltip" title="Görevler">
                        <i class="fas fa-tasks"></i> <!-- Görev simgesi -->
                    </button>
                    <button id="categoriesBtn" class="sidebar-btn" data-toggle="tooltip" title="Kategoriler">
                        <i class="fas fa-list"></i> <!-- Kategori simgesi -->
                    </button>
                    <button id="marketBtn" class="sidebar-btn" data-toggle="tooltip" title="Market">
                        <i class="fas fa-store"></i> <!-- Market simgesi -->
                    </button>
                    <button id="calendarBtn" class="sidebar-btn" data-toggle="tooltip" title="Takvim">
                        <i class="fas fa-calendar-alt"></i> <!-- Takvim simgesi -->
                    </button>
                </div>
        
                <!-- Ortadaki Görevler -->
                <div class="tasks-container flex-grow-1 p-3" id="tasksContainer">
                    <!-- Görevler Dinamik Olarak Buraya Eklenir -->
                </div>
        
                <!-- Sağ Menü -->
                <div class="sidebar-right">
                    <button id="goalsBtn" class="sidebar-btn" data-toggle="tooltip" title="Hedefler">
                        <i class="fas fa-bullseye"></i> <!-- Hedefler simgesi -->
                    </button>
                    <button id="habitTrackerBtn" class="sidebar-btn" data-toggle="tooltip" title="Alışkanlık Takibi">
                        <i class="fas fa-chart-line"></i> <!-- Alışkanlık Takibi simgesi -->
                    </button>
                    <button id="settingsBtn" class="sidebar-btn" data-toggle="tooltip" title="Ayarlar">
                        <i class="fas fa-cogs"></i> <!-- Ayarlar simgesi -->
                    </button>
                </div>
            </div>
        </div>
        

    </div>

    <!-- Ses dosyaları -->
    <audio id="click" src="mp3/click.mp3"></audio>
    <audio id="option" src="mp3/menu_option.mp3"></audio>
    <audio id="claps" src="mp3/claps.mp3"></audio>
    <audio id="success" src="mp3/success.mp3"></audio>
    <audio id="fail" src="mp3/fail.mp3"></audio>
    <audio id="magic" src="mp3/magic.mp3"></audio>
    <audio id="login" src="mp3/login.mp3"></audio>
    <audio id="login_denied" src="mp3/login_denied.mp3"></audio>
    <audio id="delete" src="mp3/delete.mp3"></audio>
    <audio id="buy" src="mp3/buy.mp3"></audio>
    

    <script src="main.js"></script>

</body>
</html>
