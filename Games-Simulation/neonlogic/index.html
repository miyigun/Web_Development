<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Neon Logic: Retro Edition</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

		:root {
			--bg-color: #050505;
			--panel-bg: #111;
			--target-on: #000000;
			--target-off: #2a2a2a;
			--player-on: #00f3ff;
			--player-off: #1f1f1f;
			--hint-color: #ff0055;
			--cell-size: 50px; 
			--gap: 5px;
		}

		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		body {
			font-family: 'Orbitron', sans-serif;
			background-color: var(--bg-color);
			color: white;
			display: flex;
			flex-direction: column;
			align-items: center;
			min-height: 100vh;
			margin: 0;
			padding: 20px 10px;
			user-select: none;
			overflow-x: hidden;
		}

		header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			width: 100%;
			max-width: 800px;
			margin-bottom: 20px;
		}

		h1 {
			font-size: 1.8rem;
			margin: 0;
			text-shadow: 0 0 15px var(--player-on);
			line-height: 1;
		}

		.lvl-badge {
			background: #222;
			padding: 5px 15px;
			border-radius: 20px;
			border: 1px solid #444;
			font-size: 0.9rem;
		}

		.game-area {
			display: flex;
			gap: 40px;
			align-items: flex-start;
			justify-content: center;
			flex-wrap: wrap;
			width: 100%;
		}

		.panel {
			background: var(--panel-bg);
			padding: 15px;
			border-radius: 15px;
			border: 1px solid #333;
			box-shadow: 0 10px 30px rgba(0,0,0,0.5);
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.panel h3 {
			margin: 0 0 10px 0;
			font-size: 0.8rem;
			color: #666;
			letter-spacing: 2px;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(5, var(--cell-size));
			grid-template-rows: repeat(5, var(--cell-size));
			gap: var(--gap);
		}

		.cell-target, .cell-player {
			width: 100%;
			height: 100%;
			border-radius: 4px;
			transition: all 0.2s;
		}

		.cell-target { background-color: var(--target-off); }
		.cell-target.active {
			background-color: var(--target-on);
			box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
			border: 1px solid #333;
		}

		.cell-player {
			background-color: var(--player-off);
			cursor: pointer;
			position: relative;
		}
		.cell-player:active { transform: scale(0.9); }
		.cell-player.active {
			background-color: var(--player-on);
			box-shadow: 0 0 15px var(--player-on);
			z-index: 2;
		}
		
		.cell-player.hint-marker::after {
			content: '';
			position: absolute;
			top: 50%; left: 50%;
			transform: translate(-50%, -50%);
			width: 30%;
			height: 30%;
			background-color: var(--hint-color);
			border-radius: 50%;
			box-shadow: 0 0 10px var(--hint-color);
			animation: pulse 0.8s infinite alternate;
		}
		@keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

		.controls {
			margin-top: 30px;
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			gap: 15px;
			width: 100%;
			max-width: 600px;
		}

		button {
			background: rgba(255,255,255,0.05);
			color: white;
			border: 1px solid #444;
			padding: 12px 20px;
			font-family: 'Orbitron', sans-serif;
			cursor: pointer;
			border-radius: 8px;
			font-size: 0.8rem;
			text-transform: uppercase;
			flex: 1 1 auto;
			min-width: 100px;
		}

		button:hover { background: #222; border-color: #666; }

		.btn-solve { color: var(--hint-color); border-color: var(--hint-color); }
		.btn-solve:active { background: var(--hint-color); color: white; }

		.audio-toggle {
			position: fixed;
			bottom: 20px;
			right: 20px;
			width: 60px;
			height: 60px;
			border-radius: 50%;
			background: #222;
			border: 2px solid var(--player-on);
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			z-index: 999;
			box-shadow: 0 0 20px rgba(0,0,0,0.5);
			font-size: 1.5rem; /* İkon boyutu */
			transition: all 0.3s;
		}
		.audio-toggle.off {
			border-color: #555;
			color: #555;
			opacity: 0.7;
		}

		@media (max-width: 600px) {
			:root { --cell-size: 11vw; --gap: 3px; }
			.game-area { gap: 20px; }
			.panel { width: 100%; max-width: 90vw; }
			h1 { font-size: 1.5rem; }
			.controls { padding-bottom: 80px; }
		}

		.modal {
			position: fixed;
			top: 0; left: 0; right: 0; bottom: 0;
			background: rgba(0,0,0,0.9);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.5s;
			z-index: 1000;
		}
		.modal.show { opacity: 1; pointer-events: all; }
		.modal h2 {
			font-size: 2.5rem;
			color: var(--player-on);
			text-shadow: 0 0 20px var(--player-on);
		}
	</style>
</head>
<body>

	<header>
		<h1>NEON LOGIC</h1>
		<div class="lvl-badge">LEVEL <span id="lvlNum">1</span></div>
	</header>

	<div class="game-area">
		<div class="panel">
			<h3>HEDEF</h3>
			<div class="grid" id="targetGrid"></div>
		</div>
		<div class="panel">
			<h3>KONTROL</h3>
			<div class="grid" id="playerGrid"></div>
		</div>
	</div>

	<div class="controls">
		<button onclick="resetCurrentLevel()">Sıfırla (Tekrar)</button>
		<button class="btn-solve" onmousedown="showHint()" ontouchstart="showHint()" onmouseup="hideHint()" ontouchend="hideHint()" onmouseleave="hideHint()">Röntgen (Tut)</button>
		<button onclick="nextLevel()">Pas Geç</button>
	</div>

	<div class="audio-toggle off" id="audioBtn" onclick="toggleAudio()">♪</div>
	
	<audio id="bgMusic" loop>
		<source src="retro-gaming-271301.mp3" type="audio/mpeg">
	</audio>

	<div class="modal" id="winModal">
		<h2>BAŞARILI!</h2>
	</div>

	<script>
		// --- DEĞİŞKENLER ---
		const gridSize = 5;
		let currentLevel = 1;
		let targetState = [];
		let playerState = [];
		let solutionMap = []; // Anlık çözüm haritası
		let initialSolution = []; // Bölümün orijinal çözüm haritası (Reset için)
		let isHintActive = false;
		let isAudioOn = false;

		// --- SES YÖNETİMİ ---
		const bgMusic = document.getElementById('bgMusic');
		// Ses efekti için basit osilatör (Müzik dosyası hariç efektler kodla üretilir)
		const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

		function toggleAudio() {
			const btn = document.getElementById('audioBtn');
			isAudioOn = !isAudioOn;

			if (isAudioOn) {
				// Müziği başlat
				bgMusic.volume = 0.5; // Ses seviyesi %50
				bgMusic.play().catch(e => console.log("Oynatma hatası (tarayıcı izni gerek):", e));
				
				// Buton stili
				btn.classList.remove('off');
				btn.style.borderColor = "var(--player-on)";
				btn.style.color = "var(--player-on)";
				btn.style.boxShadow = "0 0 15px var(--player-on)";
			} else {
				// Müziği durdur
				bgMusic.pause();
				
				// Buton stili
				btn.classList.add('off');
				btn.style.borderColor = "#555";
				btn.style.color = "#555";
				btn.style.boxShadow = "none";
			}
		}

		function playSfx(type) {
			if (!isAudioOn) return;
			// Web Audio API ile kısa bip sesleri
			if (audioCtx.state === 'suspended') audioCtx.resume();
			
			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			osc.connect(gain);
			gain.connect(audioCtx.destination);
			const now = audioCtx.currentTime;

			if (type === 'click') {
				osc.type = 'square';
				osc.frequency.setValueAtTime(800, now);
				osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
				gain.gain.setValueAtTime(0.05, now);
				gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
				osc.start(now);
				osc.stop(now + 0.1);
			} else if (type === 'win') {
				osc.type = 'triangle';
				osc.frequency.setValueAtTime(440, now); // A4
				osc.frequency.setValueAtTime(554, now + 0.1); // C#5
				osc.frequency.setValueAtTime(659, now + 0.2); // E5
				gain.gain.setValueAtTime(0.1, now);
				gain.gain.linearRampToValueAtTime(0, now + 0.5);
				osc.start(now);
				osc.stop(now + 0.5);
			}
		}

		// --- OYUN MANTIĞI ---
		const targetEl = document.getElementById('targetGrid');
		const playerEl = document.getElementById('playerGrid');
		const lvlEl = document.getElementById('lvlNum');

		function initGrids() {
			targetEl.innerHTML = '';
			playerEl.innerHTML = '';
			for(let i=0; i<gridSize*gridSize; i++) {
				let t = document.createElement('div');
				t.className = 'cell-target';
				targetEl.appendChild(t);
				
				let p = document.createElement('div');
				p.className = 'cell-player';
				p.addEventListener('pointerdown', (e) => {
					e.preventDefault();
					handleMove(i);
				});
				playerEl.appendChild(p);
			}
		}

		function toggle(arr, idx) {
			const r = Math.floor(idx / gridSize);
			const c = idx % gridSize;
			const flip = (row, col) => {
				if(row >= 0 && row < gridSize && col >= 0 && col < gridSize) {
					const i = row * gridSize + col;
					arr[i] = !arr[i];
				}
			};
			flip(r, c); flip(r-1, c); flip(r+1, c); flip(r, c-1); flip(r, c+1);
		}

		function updateView() {
			const tCells = targetEl.children;
			const pCells = playerEl.children;
			for(let i=0; i<gridSize*gridSize; i++) {
				tCells[i].className = targetState[i] ? 'cell-target active' : 'cell-target';
				
				let pClass = playerState[i] ? 'cell-player active' : 'cell-player';
				if(isHintActive && solutionMap[i]) pClass += ' hint-marker';
				pCells[i].className = pClass;
			}
		}

		function generateLevel() {
			targetState = new Array(gridSize*gridSize).fill(false);
			playerState = new Array(gridSize*gridSize).fill(false);
			solutionMap = new Array(gridSize*gridSize).fill(false);
			initialSolution = new Array(gridSize*gridSize).fill(false);
			
			let moves = 3 + currentLevel; 
			for(let k=0; k<moves; k++) {
				let randIdx = Math.floor(Math.random() * (gridSize*gridSize));
				toggle(targetState, randIdx);
				// Çözüm haritasını güncelle
				solutionMap[randIdx] = !solutionMap[randIdx];
				// Başlangıç çözümünü de sakla (Reset için)
				initialSolution[randIdx] = !initialSolution[randIdx];
			}
			updateView();
			lvlEl.innerText = currentLevel;
		}

		function handleMove(idx) {
			playSfx('click');
			toggle(playerState, idx);
			solutionMap[idx] = !solutionMap[idx]; // Çözüm gereksinimini güncelle
			updateView();
			checkWin();
		}

		function checkWin() {
			let win = true;
			for(let i=0; i<gridSize*gridSize; i++) {
				if(targetState[i] !== playerState[i]) {
					win = false;
					break;
				}
			}
			if(win) {
				playSfx('win');
				document.getElementById('winModal').classList.add('show');
				setTimeout(() => {
					document.getElementById('winModal').classList.remove('show');
					currentLevel++;
					generateLevel();
				}, 1500);
			}
		}

		function showHint() {
			isHintActive = true;
			updateView();
		}
		function hideHint() {
			isHintActive = false;
			updateView();
		}

		// SADECE oyuncuyu sıfırla, hedefi koru
		function resetCurrentLevel() {
			playSfx('click');
			// Oyuncunun ızgarasını temizle
			playerState = new Array(gridSize*gridSize).fill(false);
			// Çözüm haritasını oyunun başındaki haline geri getir
			solutionMap = [...initialSolution];
			updateView();
		}

		// Bölümü atla ve yenisini getir
		function nextLevel() {
			playSfx('click');
			currentLevel++; // Seviyeyi artır
			generateLevel(); // Yeni desen üret
		}

		initGrids();
		generateLevel();

	</script>
</body>
</html>
